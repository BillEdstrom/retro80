appId: com.edstrom.retro80
productName: Retro80
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  # Signed + notarized for distribution. electron-builder auto-discovers the
  # "Developer ID Application" certificate in the login keychain.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization via notarytool. All creds come from env vars:
  # APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID.
  notarize: true
dmg:
  artifactName: ${productName}-${version}.${ext}
# Update feed + release host. owner/repo are auto-detected from the git remote
# (or package.json "repository") at build time and baked into app-update.yml,
# which electron-updater reads at runtime to find new releases.
publish:
  provider: github
npmRebuild: false
